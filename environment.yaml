name: ev_hw2
channels:
  - nvidia/label/cuda-12.8.0
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # CUDA 12.8 toolkit – required for sm_120 (Blackwell / RTX 5090) support
  - cuda-toolkit=12.8.0
  - pip:
    # Keep in sync with requirements.txt (or after `conda env create`, run:
    #   pip install -r requirements.txt
    - -r requirements.txt
    # CUDA extensions: not installable from PyPI; build from submodules (see setup_env.sh)
